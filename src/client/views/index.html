<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rendered Markdown</title>
  <meta name="description" content="A minimalist blog editor for writing and publishing markdown.">
  <meta name="theme-color" content="#ffffff">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
  <link rel="stylesheet" href="../style/index.css">
</head>
<body>

  <div id="app" class="app">

    <!-- ======= SIDEBAR ======= -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <div class="app-logo">
          <span>Rendered Markdown</span>
        </div>
        <div class="sidebar-actions">
          <button id="btn-import-post" class="btn-icon btn-outline" title="Import .md file">
            <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          </button>
          <input type="file" id="file-import" accept=".md" class="hidden">
          
          <button id="btn-new-post" class="btn-new-post" title="New Post (Ctrl+N)">
            <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
        </div>
      </div>

      <!-- Public Blog Link as a prominent sidebar option -->
      <a href="/blog.html" target="_blank" style="display: flex; align-items: center; gap: 8px; padding: 12px 24px; color: var(--text-primary); text-decoration: none; border-bottom: 1px solid var(--border-subtle); background: var(--bg-base); font-weight: 500; font-size: 0.85rem;">
        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
        View Public Blog
      </a>

      <div class="sidebar-search">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
        </svg>
        <input type="search" id="search-input" placeholder="Search posts..." autocomplete="off">
      </div>

      <nav class="sidebar-filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="draft">Drafts</button>
        <button class="filter-btn" data-filter="published">Published</button>
      </nav>

      <div id="post-list" class="post-list">
        <!-- Post cards rendered by JS -->
      </div>

      <div class="sidebar-footer">
        <span id="post-count" style="font-size: 0.75rem; color: var(--text-muted);">0 posts</span>
      </div>
    </aside>

    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <!-- ======= MAIN CONTENT ======= -->
    <main id="main-content" class="main-content">

      <!-- Top Bar -->
      <header class="topbar" id="topbar">
        <div class="topbar-left">
          <button id="btn-toggle-sidebar" class="btn-icon" title="Toggle Sidebar">
            <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <span id="post-status-badge" class="status-badge draft">Draft</span>
          <span id="auto-save-indicator" class="auto-save-indicator">Saved</span>
        </div>

        <div class="topbar-center">
          <div class="format-toggle" id="format-toggle">
            <button class="format-btn active" data-format="markdown">Markdown</button>
            <button class="format-btn" data-format="plaintext">Plain Text</button>
          </div>
        </div>

        <div class="topbar-right">
          <button id="btn-export-post" class="btn-icon" title="Export as .md">
            <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          </button>
          <button id="btn-preview-toggle" class="btn-icon" title="Toggle Preview">
            <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
          
          <button id="btn-publish" class="btn-action btn-primary" title="Publish (Ctrl+Enter)">
            <svg viewBox="0 0 24 24"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 014-4h14"/></svg>
            <span>Publish</span>
          </button>
          
          <!-- Delete button removed from topbar -->
        </div>
      </header>

      <!-- Editor + Preview Area -->
      <div class="editor-area" id="editor-area">
        <div class="editor-panel" id="editor-panel">
          <input type="text" id="post-title" class="post-title-input" placeholder="Untitled Post" spellcheck="true">
          <div class="editor-wrapper">
            <textarea id="post-content" class="post-content-input" placeholder="Start writing..." spellcheck="true"></textarea>
          </div>
          <footer class="editor-footer">
            <span id="word-count">0 words</span>
            <span class="footer-divider">·</span>
            <span id="char-count">0 chars</span>
            <span class="footer-divider">·</span>
            <span id="read-time">0 min read</span>
          </footer>
        </div>
        <div class="panel-divider" id="panel-divider"></div>
        <div class="preview-panel" id="preview-panel">
          <div class="preview-label">Preview</div>
          <article id="preview-content" class="preview-content markdown-body">
            <p class="preview-placeholder">Start writing to see the preview…</p>
          </article>
        </div>
      </div>

      <!-- Empty State -->
      <div id="empty-state" class="empty-state">
        <h2>Rendered Markdown</h2>
        <p>Create a new post or open the sidebar to select one.</p>
        <button id="btn-empty-new" class="btn-action btn-primary">
          <svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:currentColor;stroke-width:2;fill:none"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          <span>Create Post</span>
        </button>
      </div>

    </main>
  </div>

  <!-- DELETE CONFIRMATION DIALOG -->
  <dialog id="delete-dialog" class="modal-dialog">
    <div class="modal-content">
      <h2>Delete Post</h2>
      <p id="delete-dialog-message">This action cannot be undone. The post will be permanently removed.</p>
      <div class="modal-actions">
        <button id="btn-cancel-delete" class="btn-action btn-outline">Cancel</button>
        <button id="btn-confirm-delete" class="btn-action btn-delete">Delete</button>
      </div>
    </div>
  </dialog>

  <div id="toast-container" class="toast-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="../js/app.js"></script>

</body>
</html>
